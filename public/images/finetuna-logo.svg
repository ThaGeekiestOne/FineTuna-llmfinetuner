<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="drop-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle (optional - for icon context) -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Main shape: Stylized tuning fork with flowing design -->
  <!-- Handle -->
  <rect x="85" y="130" width="30" height="50" rx="15" fill="url(#logoGradient)" filter="url(#drop-shadow)"/>
  
  <!-- Left prong -->
  <path d="M 70 130 Q 60 100 65 60 Q 68 40 75 30" 
        stroke="url(#logoGradient)" stroke-width="16" fill="none" stroke-linecap="round" filter="url(#drop-shadow)"/>
  
  <!-- Right prong -->
  <path d="M 130 130 Q 140 100 135 60 Q 132 40 125 30" 
        stroke="url(#logoGradient)" stroke-width="16" fill="none" stroke-linecap="round" filter="url(#drop-shadow)"/>
  
  <!-- Center prong (shorter) -->
  <path d="M 100 130 Q 100 95 100 55" 
        stroke="url(#accentGradient)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#drop-shadow)"/>
  
  <!-- Decorative dots (waves/frequency) -->
  <circle cx="55" cy="75" r="3" fill="#06b6d4" opacity="0.6"/>
  <circle cx="50" cy="55" r="2.5" fill="#06b6d4" opacity="0.4"/>
  
  <circle cx="145" cy="75" r="3" fill="#0891b2" opacity="0.6"/>
  <circle cx="150" cy="55" r="2.5" fill="#0891b2" opacity="0.4"/>
  
  <!-- Highlight accent lines -->
  <line x1="60" y1="90" x2="55" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="140" y1="90" x2="145" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
